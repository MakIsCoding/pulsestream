# Railway deployment config for PulseStream — Web API service
#
# This file is read by Railway when the service root is set to the repo root.
# For the other 4 services (websocket, scheduler, ingester, analyzer),
# set their Dockerfile path in the Railway dashboard (see README for instructions).

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/web/Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
