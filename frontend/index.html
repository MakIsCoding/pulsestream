<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseStream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Landing page */
    html { scroll-behavior: smooth; }
    .gradient-text {
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 55% at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%);
    }
    .hero-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(99,102,241,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-down { animation: slideDown 0.35s ease-out both; }
    @keyframes stageGlow {
      0%, 80%, 100% { border-color: rgb(51,65,85); }
      40%  { border-color: rgba(99,102,241,0.65); box-shadow: 0 0 20px rgba(99,102,241,0.2); }
    }
    .stage-1 { animation: stageGlow 5s ease-in-out infinite; }
    .stage-2 { animation: stageGlow 5s ease-in-out infinite; animation-delay: 1s; }
    .stage-3 { animation: stageGlow 5s ease-in-out infinite; animation-delay: 2s; }
    .stage-4 { animation: stageGlow 5s ease-in-out infinite; animation-delay: 3s; }
    .stage-5 { animation: stageGlow 5s ease-in-out infinite; animation-delay: 4s; }
    @keyframes connFlow {
      0%, 70%, 100% { opacity: 0.2; }
      35% { opacity: 1; }
    }
    .conn-1 { animation: connFlow 5s ease-in-out infinite; animation-delay: 0.5s; }
    .conn-2 { animation: connFlow 5s ease-in-out infinite; animation-delay: 1.5s; }
    .conn-3 { animation: connFlow 5s ease-in-out infinite; animation-delay: 2.5s; }
    .conn-4 { animation: connFlow 5s ease-in-out infinite; animation-delay: 3.5s; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased">
  <div id="app"></div>
  <div id="toasts" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
